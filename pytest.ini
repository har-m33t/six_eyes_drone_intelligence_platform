[pytest]
testpaths = tests
# NOTE: this machine has a global PYTHONPATH pointing at a ROS2 / Python 3.8
# install (C:\dev\ros2-windows), so pytest auto-discovers ROS2's broken pytest
# plugins and crashes. This project needs no third-party pytest plugins, so run
# tests with autoload disabled:
#   PowerShell:  $env:PYTEST_DISABLE_PLUGIN_AUTOLOAD=1; python -m pytest
#   bash:        PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest
# (The env var must be set before the pytest process starts; it cannot be set
# from inside pytest.ini or conftest.py.)
